<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Free AI Proxy</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
  header{background:linear-gradient(135deg,#1e40af,#7c3aed);padding:3rem 2rem;text-align:center}
  header h1{font-size:2.4rem;font-weight:800;letter-spacing:-1px}
  header p{margin-top:.5rem;opacity:.85;font-size:1.05rem}
  .key-box{margin:1.5rem auto;max-width:540px;background:#ffffff15;border:1px solid #ffffff30;
    border-radius:12px;padding:1rem 1.5rem;font-family:monospace;font-size:.9rem;word-break:break-all}
  .key-box span{color:#fbbf24;font-weight:700}
  .copy-btn{margin-top:.6rem;display:inline-block;padding:.3rem .9rem;background:#6366f1;
    color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.8rem}
  .copy-btn:hover{background:#4f46e5}
  main{max-width:1100px;margin:2rem auto;padding:0 1rem 3rem}
  .stats{text-align:center;color:#64748b;font-size:.9rem;margin-bottom:1.4rem}
  .search-box input{width:100%;padding:.8rem 1.2rem;border-radius:10px;border:1px solid #334155;
    background:#1e293b;color:#e2e8f0;font-size:1rem;outline:none;margin-bottom:1.4rem}
  .search-box input:focus{border-color:#6366f1}
  h2{font-size:1.2rem;margin-bottom:1rem;color:#94a3b8;text-transform:uppercase;letter-spacing:2px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.2rem}
  .card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:1.4rem}
  .card h3{font-size:.88rem;color:#7dd3fc;margin-bottom:.9rem;font-family:monospace;word-break:break-all}
  .badges{display:flex;flex-direction:column;gap:.5rem}
  .badge{padding:.45rem .8rem;border-radius:8px;font-size:.82rem;font-weight:600;
    font-family:monospace;cursor:pointer;transition:opacity .15s;line-height:1.5}
  .badge:hover{opacity:.75}
  .badge small{display:block;font-size:.72rem;opacity:.65;margin-top:2px;word-break:break-all}
  .error{color:#ef4444;text-align:center;padding:2rem}
  .toast{position:fixed;bottom:1.8rem;right:1.8rem;background:#22c55e;color:#fff;
    padding:.65rem 1.1rem;border-radius:10px;font-size:.88rem;
    opacity:0;transition:opacity .25s;pointer-events:none;z-index:999}
  .toast.show{opacity:1}
  footer{text-align:center;padding:2rem 1rem 1rem;color:#475569;font-size:.85rem}
  footer strong{color:#94a3b8}
  .admin-link{margin-top:1.4rem;opacity:0;transition:opacity .3s}
  footer:hover .admin-link{opacity:.4}
  .admin-link:hover{opacity:1 !important}
  .admin-link a{color:#475569;text-decoration:none;font-size:.75rem;
    padding:.25rem .7rem;border:1px solid #1e293b;border-radius:6px;transition:all .2s}
  .admin-link a:hover{color:#94a3b8;border-color:#334155;background:#1e293b}
</style>
</head>
<body>
<header>
  <h1>🚀 Free AI Proxy</h1>
  <p>OpenAI-compatible · SillyTavern · JanitorAI · any OpenAI client</p>
  <div class="key-box">
    <div>Base URL: <span id="base-url">loading…</span></div>
    <div style="margin-top:.4rem">API Key: <span id="kv">want-free-ai?here-you-go-gemini</span></div>
    <button class="copy-btn" onclick="copyKey()">📋 Copy API Key</button>
  </div>
</header>
<main>
  <div class="stats" id="stats">Loading models…</div>
  <div class="search-box">
    <input type="text" id="q" placeholder="🔍  Filter models…" oninput="filter()" disabled>
  </div>
  <h2>Available Models</h2>
  <div class="grid" id="grid"></div>
</main>
<footer>
  Set your client's <strong>Base URL</strong> to <strong id="footer-url">…</strong>
  <div class="admin-link">
    <a href="/admin">⚙️ Admin Login</a>
  </div>
</footer>
<div class="toast" id="toast"></div>
<script>
const PROXY_KEY = "want-free-ai?here-you-go-gemini";
const BASE_URL  = window.location.origin + "/v1";
document.getElementById("base-url").textContent  = BASE_URL;
document.getElementById("footer-url").textContent = BASE_URL;

async function loadModels() {
  const grid = document.getElementById("grid");
  try {
    const res = await fetch("/v1/models");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data   = await res.json();
    const models = data.data.map((m) => m.id);

    const groups = {};
    for (const id of models) {
      const family = id.replace(/-(true|fake)-stream$/, "");
      if (!groups[family]) groups[family] = [];
      groups[family].push(id);
    }

    document.getElementById("stats").textContent =
      `${models.length} models · ${Object.keys(groups).length} families · click any badge to copy model ID`;
    document.getElementById("q").disabled = false;

    grid.innerHTML = Object.entries(groups).map(([family, ids]) => {
      const badges = ids.map((id) => {
        const isTrue   = id.endsWith("true-stream");
        const isSearch = id.includes("-search-");
        const label    = isTrue ? "✅ True Stream" : "🔄 Fake Stream";
        const srch     = isSearch ? " 🔍" : "";
        const color    = isTrue ? "#22c55e" : "#f97316";
        return `<div class="badge"
          style="background:${color}20;color:${color};border:1px solid ${color}40"
          onclick="copyText('${id}')">
          ${label}${srch}<small>${id}</small>
        </div>`;
      }).join("");
      return `<div class="card" data-search="${ids.join(" ")} ${family}">
        <h3>${family}</h3><div class="badges">${badges}</div>
      </div>`;
    }).join("");

  } catch (e) {
    grid.innerHTML = `<p class="error">Failed to load models: ${e.message}</p>`;
    document.getElementById("stats").textContent = "";
  }
}

function filter() {
  const q = document.getElementById("q").value.toLowerCase();
  document.querySelectorAll(".card").forEach((c) => {
    c.style.display = c.dataset.search.toLowerCase().includes(q) ? "" : "none";
  });
}
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}
function copyText(str) {
  navigator.clipboard.writeText(str)
    .then(() => showToast("Copied: " + str.slice(0, 42) + (str.length > 42 ? "…" : "")))
    .catch(() => showToast("Copy failed — try manually"));
}
function copyKey() { copyText(PROXY_KEY); }
loadModels();
</script>
</body>
</html>
